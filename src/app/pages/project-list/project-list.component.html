<div class="max-w-7xl mx-auto p-5 sm:p-10 md:p-16 lg:p-0 lg:py-10">
  <h1 class="text-center text-5xl font-bold text-white pt-2 pb-10">All projects</h1>
  <div class="grid grid-cols-1 md:grid-cols-3 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    <a
      *ngFor="let project of (projects$ | async)"
      [href]="project.href"
      class="rounded overflow-hidden shadow-md bg-black/20 cursor-pointer hover:bg-primary hover:shadow-general">
      <div class="relative h-56">
        <img class="w-full h-full object-cover"
             [src]="project.imageUrl"
             [alt]="project.alt">
        <div
          class="hover:bg-transparent transition duration-300 absolute bottom-0 top-0 right-0 left-0 bg-gray-900 opacity-25">
        </div>
      </div>
      <div class="px-6 py-4">
        <a
          class="font-semibold text-lg text-white inline-block transition duration-300 ease-in-out">
          {{project.title}}
        </a>
        <p class="text-secondary text-sm line-clamp-1">
          {{project.description}}
        </p>
      </div>
    </a>
  </div>
</div>
